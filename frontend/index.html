<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Orizzonte360 — Piattaforma Enterprise</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="loginPage" class="login-page">
  <div class="login-card">
    <h1 data-brand-name>Orizzonte360</h1>
    <p>La tua azienda. Vista a 360°.</p>

    <h3>Login</h3>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">
    <button onclick="loginUser()">Login</button>

    <h3>Registrazione</h3>
    <input id="registerName" placeholder="Nome">
    <input id="registerEmail" placeholder="Email">
    <input id="registerPassword" type="password" placeholder="Password">
    <button onclick="registerUser()">Registrati</button>

    <div id="authResult"></div>
  </div>
</div>

<div id="app" class="app hidden">

  <aside class="sidebar">
    <div class="logo">
      <img id="dynamicBrandLogo" hidden alt="Logo brand" style="max-width:180px;max-height:54px"><h2 data-brand-name>ORIZZONTE360</h2>
      <span>Piattaforma Enterprise</span>
    </div>

<button class="nav-btn active" onclick="showPage('dashboard', this)">🏠 Panoramica</button>
<button class="nav-btn" onclick="showPage('finance', this)">💰 Finanza</button>
<button class="nav-btn" onclick="showPage('customer', this)">👥 Clienti</button>
<button class="nav-btn" onclick="showPage('compliance', this)">📄 Compliance</button>
<button class="nav-btn" onclick="showPage('cyber', this)">🛡 Cyber Security</button>
<button class="nav-btn" onclick="showPage('assistant', this)">🤖 Assistente AI</button>
<button class="nav-btn" onclick="showPage('reports', this)">📊 Report</button>
<button class="nav-btn" onclick="showPage('billing', this)">💳 Abbonamenti</button>
<button class="nav-btn" onclick="showPage('release', this)">🚀 Aggiornamenti</button>
<button class="nav-btn" onclick="showPage('import', this)">📂 Importazione Dati</button>
<button class="nav-btn" onclick="showPage('settings', this)">⚙️ Impostazioni</button>
<button class="nav-btn" onclick="renderWhiteLabel(); document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active')); this.classList.add('active')">🎨 White Label</button>

    <button class="logout-btn" onclick="logoutUser()">Esci</button>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <h1 id="pageTitle">Panoramica</h1>
        <p id="userInfo"></p>
      </div>

      <div class="top-actions">
      <div id="tenantSelectorBox"></div>
  <input id="globalCompanyId" placeholder="ID azienda" value="1">

  <button class="notification-btn" onclick="toggleNotifications()">
    🔔 <span id="notificationCount">0</span>
  </button>

  <div id="notificationPanel" class="notification-panel hidden">
    <h3>Centro Notifiche</h3>
    <div id="notificationBox"></div>
  </div>
</div>
    </header>

    <section id="pageContent"></section>
  </main>

</div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/finance.js"></script>
<script src="js/customer.js"></script>
<script src="js/compliance.js"></script>
<script src="js/cyber.js"></script>
<script src="js/assistant.js"></script>
<script src="js/notifications.js"></script>
<script src="js/digital_twin.js"></script>
<script src="js/reports.js"></script>
<script src="js/billing.js"></script>
<script src="js/release.js"></script>
<script src="js/import.js"></script>
<script src="js/tenant.js"></script>
<script src="js/settings.js"></script>
<script src="js/white-label.js"></script>

</body>
</html>
