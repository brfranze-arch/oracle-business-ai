<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Oracle Business AI</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="loginPage" class="login-page">
  <div class="login-card">
    <h1>Oracle Business AI</h1>
    <p>Enterprise AI Business Intelligence Platform</p>

    <h3>Login</h3>
    <input id="loginEmail" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">
    <button onclick="loginUser()">Login</button>

    <h3>Registrazione</h3>
    <input id="registerName" placeholder="Nome">
    <input id="registerEmail" placeholder="Email">
    <input id="registerPassword" type="password" placeholder="Password">
    <button onclick="registerUser()">Registrati</button>

    <div id="authResult"></div>
  </div>
</div>

<div id="app" class="app hidden">

  <aside class="sidebar">
    <div class="logo">
      <h2>Oracle AI</h2>
      <span>Business Intelligence</span>
    </div>

<button class="nav-btn active" onclick="showPage('dashboard', this)">🚀 Dashboard</button>
<button class="nav-btn" onclick="showPage('finance', this)">💰 Finance</button>
<button class="nav-btn" onclick="showPage('customer', this)">👥 Customer</button>
<button class="nav-btn" onclick="showPage('compliance', this)">📄 Compliance</button>
<button class="nav-btn" onclick="showPage('cyber', this)">🛡 Cyber</button>
<button class="nav-btn" onclick="showPage('assistant', this)">🤖 Assistant</button>
<button class="nav-btn" onclick="showPage('reports', this)">📊 Reports</button>
<button class="nav-btn" onclick="showPage('billing', this)">💳 Billing</button>
<button class="nav-btn" onclick="showPage('import', this)">📂 Import</button>
<button class="nav-btn" onclick="showPage('settings', this)">⚙️ Settings</button>

    <button class="logout-btn" onclick="logoutUser()">Logout</button>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <h1 id="pageTitle">Dashboard</h1>
        <p id="userInfo"></p>
      </div>

      <div class="top-actions">
  <input id="globalCompanyId" placeholder="ID azienda" value="1">

  <button class="notification-btn" onclick="toggleNotifications()">
    🔔 <span id="notificationCount">0</span>
  </button>

  <div id="notificationPanel" class="notification-panel hidden">
    <h3>Notification Center</h3>
    <div id="notificationBox"></div>
  </div>
</div>
    </header>

    <section id="pageContent"></section>
  </main>

</div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/finance.js"></script>
<script src="js/customer.js"></script>
<script src="js/compliance.js"></script>
<script src="js/cyber.js"></script>
<script src="js/assistant.js"></script>
<script src="js/notifications.js"></script>
<script src="js/reports.js"></script>
<script src="js/billing.js"></script>
<script src="js/import.js"></script>
<script src="js/settings.js"></script>

</body>
</html>
